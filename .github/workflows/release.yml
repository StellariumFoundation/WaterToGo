name: Build & Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
        include:
          - arch: x86_64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install rsrc
        run: go install github.com/akavel/rsrc@latest

      - name: Generate icon and build
        run: |
          sudo apt-get install -y imagemagick
          convert assets/logo.png -resize 256x256 -define icon:auto-resize=256,64,48,32,16 assets/icon.ico
          rsrc -ico assets/icon.ico -o watertogo.syso
          GOARCH=${{ matrix.goarch }} GOOS=windows go build -ldflags="-s -w" -o WaterToGo-${{ matrix.arch }}.exe .
          rm watertogo.syso

      - uses: actions/upload-artifact@v5
        with:
          name: watertogo-windows-${{ matrix.arch }}
          path: WaterToGo-${{ matrix.arch }}.exe

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
        include:
          - arch: x86_64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build binary
        run: GOARCH=${{ matrix.goarch }} GOOS=linux go build -ldflags="-s -w" -o watertogo .

      - name: Create AppDir
        run: |
          mkdir -p WaterToGo.AppDir
          cp watertogo WaterToGo.AppDir/
          cp assets/logo.png WaterToGo.AppDir/
          cp LICENSE WaterToGo.AppDir/

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=WaterToGo' \
            'Comment=Convert JS/TS/Python/Rust codebases to Go using Gemini' \
            'Exec=watertogo' \
            'Icon=logo' \
            'Terminal=true' \
            'Type=Application' \
            'Categories=Development;Utility;' \
            > WaterToGo.AppDir/WaterToGo.desktop

          printf '%s\n' \
            '#!/bin/bash' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            'exec "$HERE/watertogo"' \
            > WaterToGo.AppDir/AppRun
          chmod +x WaterToGo.AppDir/AppRun
          ln -s logo.png WaterToGo.AppDir/.DirIcon

      - name: Package AppImage
        run: |
          sudo apt-get install -y squashfs-tools
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract > /dev/null 2>&1
          ARCH=${{ matrix.arch }} ./squashfs-root/AppRun WaterToGo.AppDir WaterToGo-${{ matrix.arch }}.AppImage

      - uses: actions/upload-artifact@v5
        with:
          name: watertogo-linux-${{ matrix.arch }}
          path: WaterToGo-${{ matrix.arch }}.AppImage

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
        include:
          - arch: x86_64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build binary
        run: GOARCH=${{ matrix.goarch }} GOOS=darwin go build -ldflags="-s -w" -o watertogo .

      - name: Set version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          if [ "$RAW" = "$GITHUB_REF_NAME" ]; then
            RAW="0.0.0-dev+$(echo ${GITHUB_SHA:0:7})"
          fi
          echo "VERSION=$RAW" >> $GITHUB_ENV

      - name: Create .app bundle
        run: |
          appdir=WaterToGo-${{ matrix.arch }}.app
          mkdir -p "$appdir/Contents/MacOS" "$appdir/Contents/Resources"

          cp watertogo "$appdir/Contents/MacOS/watertogo"
          chmod +x "$appdir/Contents/MacOS/watertogo"

          printf '%s\n' \
            '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' \
            'open -a Terminal "$SCRIPT_DIR/watertogo"' \
            > "$appdir/Contents/MacOS/launcher.sh"
          chmod +x "$appdir/Contents/MacOS/launcher.sh"

          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '  <key>CFBundleExecutable</key>'
            echo '  <string>launcher.sh</string>'
            echo '  <key>CFBundleIdentifier</key>'
            echo '  <string>com.watertogo.app</string>'
            echo '  <key>CFBundleName</key>'
            echo '  <string>WaterToGo</string>'
            echo '  <key>CFBundleDisplayName</key>'
            echo '  <string>WaterToGo</string>'
            echo '  <key>CFBundlePackageType</key>'
            echo '  <string>APPL</string>'
            echo '  <key>CFBundleShortVersionString</key>'
            echo "  <string>$VERSION</string>"
            echo '  <key>CFBundleVersion</key>'
            echo "  <string>$VERSION</string>"
            echo '  <key>CFBundleIconFile</key>'
            echo '  <string>icon</string>'
            echo '  <key>NSHighResolutionCapable</key>'
            echo '  <true/>'
            echo '</dict>'
            echo '</plist>'
          } > "$appdir/Contents/Info.plist"

          mkdir -p WaterToGo.iconset
          sips --cropToHeightWidth 3171 3171 assets/logo.png --out /tmp/logo-square.png
          sips -z 16 16 /tmp/logo-square.png --out WaterToGo.iconset/icon_16x16.png
          sips -z 32 32 /tmp/logo-square.png --out WaterToGo.iconset/icon_32x32.png
          sips -z 128 128 /tmp/logo-square.png --out WaterToGo.iconset/icon_128x128.png
          sips -z 256 256 /tmp/logo-square.png --out WaterToGo.iconset/icon_256x256.png
          sips -z 512 512 /tmp/logo-square.png --out WaterToGo.iconset/icon_256x256@2x.png
          iconutil -c icns WaterToGo.iconset -o "$appdir/Contents/Resources/icon.icns"
          cp LICENSE "$appdir/Contents/Resources/"

          tar czf "WaterToGo-darwin-${{ matrix.arch }}.tar.gz" "$appdir"

      - uses: actions/upload-artifact@v5
        with:
          name: watertogo-darwin-${{ matrix.arch }}
          path: WaterToGo-darwin-${{ matrix.arch }}.tar.gz

  release:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: watertogo-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum WaterToGo-* > checksums.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_id }}
          name: "Build #${{ github.run_id }} (${{ github.sha }})"
          body: ${{ github.event.head_commit.message || 'Automated build' }}
          files: |
            WaterToGo-x86_64.exe
            WaterToGo-arm64.exe
            WaterToGo-x86_64.AppImage
            WaterToGo-arm64.AppImage
            WaterToGo-darwin-x86_64.tar.gz
            WaterToGo-darwin-arm64.tar.gz
            checksums.txt
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}
